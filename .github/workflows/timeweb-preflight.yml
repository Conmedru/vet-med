name: Timeweb Preflight

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  app-preflight:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nucmed-modern
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_APP_URL: https://example.com
      NODE_ENV: production
      ADMIN_API_KEY: ci-admin-key
      INGEST_API_KEY: ci-ingest-key
      CRON_SECRET: ci-cron-secret
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nucmed-modern/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

  root-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build root Docker image
        run: docker build -f Dockerfile .
